# https://cloud.google.com/blog/products/devops-sre/software-delivery-pipelines-with-gitlab-cicd-and-cloud-deploy/
stages:
  - lint
  - typecheck
  - test
  - build
  - push
  - deploy

variables:
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  PROJECT: mimetic-retina-450410-q0 #civil-charmer-313017
  LOCATION: europe-west1
  SERVICE: tournament-api-app
  AR_IMAGE: $LOCATION-docker.pkg.dev/$PROJECT/tournament-api/$SERVICE

.node-base: &node-base
  image: node:22
  before_script:
    - corepack enable && corepack prepare yarn@1.22.22 --activate
    - yarn install --frozen-lockfile

lint:
  <<: *node-base
  stage: lint
  script:
    - yarn lint

typecheck:
  <<: *node-base
  stage: typecheck
  script:
    - yarn typecheck

unit-test:
  <<: *node-base
  stage: test
  script:
    - yarn test

build-job:
  stage: build
  services:
    - docker:24.0.5-dind
  image: docker:git
  before_script:
    - cp ${PRODUCTION_ENV_FILE} .env
    # Secrets are injected at Cloud Run runtime from GCP Secret Manager.
    - sed -i '/^MONGODB_URI=/d; /^JWT_SECRET=/d; /^GOOGLE_CLIENT_SECRET=/d; /^APPLE_PRIVATE_KEY=/d' .env
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$IMAGE_TAG --build-arg="COMMIT_SHA=$CI_COMMIT_SHORT_SHA" .
    - docker push $CI_REGISTRY_IMAGE:$IMAGE_TAG

include:
  - component: gitlab.com/google-gitlab-components/artifact-registry/upload-artifact-registry@0.1.0
    inputs:
      stage: push
      source: $CI_REGISTRY_IMAGE:$IMAGE_TAG
      target: $AR_IMAGE:$IMAGE_TAG

deploy-cloud-run:
  identity: google_cloud
  stage: deploy
  image: google/cloud-sdk:alpine
  variables:
    CLOUD_RUN_SECRETS: "MONGODB_URI=MONGODB_URI:latest,JWT_SECRET=JWT_SECRET:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,APPLE_PRIVATE_KEY=APPLE_PRIVATE_KEY:latest, AWS_S3_KEY_ID=AWS_S3_KEY_ID:latest, AWS_S3_KEY_SECRET=AWS_S3_KEY_SECRET:latest"
  script:
    - gcloud run deploy "$SERVICE" --project="$PROJECT" --region="$LOCATION" --image="$AR_IMAGE:$IMAGE_TAG" --set-secrets="$CLOUD_RUN_SECRETS"
