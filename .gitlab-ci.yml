include:
  - local: .gitlab-ci-prod.yml
    rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
  - local: .gitlab-ci-dev.yml
    rules:
    - if: '$CI_COMMIT_BRANCH == "development"'
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "development"'
